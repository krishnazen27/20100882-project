<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dublin Classifieds Marketplace{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f8f9fa; }
        .navbar { display: flex; border-bottom: 2px solid #716c99; margin-bottom: 20px; padding-bottom: 10px; }
        .nav-link { padding: 10px 20px; text-decoration: none; background: #d0e3e7; color: black; margin-right: 5px; font-size: 16px; border-radius: 4px; }
        .nav-link.active { background: #007bff; color: white; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f2f2f2; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; max-width: 400px; padding: 8px; box-sizing: border-box; }
        .btn-buy { background-color: #28a745; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-buy:disabled { background-color: #6c757d; cursor: not-allowed; }
        .banner { font-weight: bold; padding: 8px; margin-bottom: 15px; background-color: #e2e3e5; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/" class="nav-link {% if active_page == 'buying' %}active{% endif %}">Browse Marketplace</a>
        <a href="/selling" class="nav-link {% if active_page == 'selling' %}active{% endif %}">Sell an Item</a>
        <a href="/profile" class="nav-link {% if active_page == 'profile' %}active{% endif %}">User Info</a>
    </div>

    <div class="banner">
        {% if session.get('username') %}
            Active Session: Logged in as <strong>{{ session.get('username') }}</strong>
        {% else %}
            Guest Session (Unauthenticated)
        {% endif %}
    </div>

    <div>
        {% block content %}{% endblock %}
    </div>

    <script>
        // Setup base API endpoint URL mapping globally
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
