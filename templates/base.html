<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - {% block title %}Welcome{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f7f6; }
        nav { background: #333; padding: 15px; border-radius: 5px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #28a745; }
        .container { margin-top: 20px; background: white; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('home') }}">Buying Feed</a>
        <a href="{{ url_for('selling') }}">Selling Tab</a>
        <a href="{{ url_for('profile') }}">User Profile</a>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div style="padding: 10px; margin: 10px 0; background: #f8d7da; color: #721c24; border-radius: 4px;">
              {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
