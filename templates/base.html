<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dublin Classifieds Marketplace{% endblock %}</title>
</head>
<body style="font-family: Arial, sans-serif;">

    <!-- Minimalistic text link navigation header -->
    <div id="navbar">
        <a href="/">Browse Marketplace</a> | 
        <a href="/selling">Sell an Item</a> | 
        <a href="/profile">User Info</a>
    </div>
    <hr>

    <div id="session-banner">
        {% if session.get('username') %}
            Active Session: Logged in as <strong>{{ session.get('username') }}</strong>
        {% else %}
            Guest Session (Unauthenticated)
        {% endif %}
    </div>
    <hr>

    <div>
        {% block content %}{% endblock %}
    </div>

    <script>
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
