{% extends 'base.html' %}

{% block content %}
<h2>Marketplace Dashboard</h2>
<div class="form-group">
    <input type="text" id="search-input" placeholder="Filter listings by title, category, or seller..." style="width:100%; max-width:400px; padding:8px;">
</div>

<table border="1">
    <thead>
        <tr>
            <th>Item ID</th>
            <!-- Added style="cursor:pointer;" to headers to show they are clickable, with a dynamic sort direction symbol -->
            <th onclick="toggleSort('title')" style="cursor:pointer;">Title <span id="sort-icon-title">↕</span></th>
            <th>Category</th>
            <th onclick="toggleSort('price_eur')" style="cursor:pointer;">Price (EUR) <span id="sort-icon-price_eur">↕</span></th>
            <th>Price (USD)*</th>
            <th>Seller Name</th>
            <th onclick="toggleSort('status')" style="cursor:pointer;">Status <span id="sort-icon-status">↕</span></th>
            <th>Contact Details</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="listings-table-body"></tbody>
</table>
{% endblock %}

{% block scripts %}
<script>
    let globalListingsCache = [];
    let currentSortField = '';
    let isAscending = true;

    async function loadListings() {
        const query = document.getElementById('search-input').value;
        try {
            const response = await fetch(`${API_BASE}/listings?search=${encodeURIComponent(query)}`);
            const listings = await response.json();
            globalListingsCache = listings;
            
            // If there's an active sort criteria, re-apply it before rendering
            if (currentSortField) {
                applySorting();
            } else {
                renderListingsTable(globalListingsCache);
            }
        } catch (err) { console.error("Error fetching listings: ", err); }
    }

    // Extracted row rendering into a dedicated function so it can be re-run after sorting
    function renderListingsTable(listings) {
        const tbody = document.getElementById('listings-table-body');
        tbody.innerHTML = '';
        
        listings.forEach((item, index) => {
            const isSold = item.status === 'Sold';
            const actionBtn = isSold 
                ? `<button class="btn-buy" disabled>Sold Out</button>` 
                : `<button class="btn-buy" onclick="buyNowByIndex(${index})">Buy Now</button>`;
            
            tbody.innerHTML += `
                <tr>
                    <td><code style="font-size:1.1em; font-weight:bold;">${item.dcm_id || 'N/A'}</code></td>
                    <td><strong>${item.title}</strong></td>
                    <td>${item.category}</td>
                    <td>&euro;${item.price_eur.toFixed(2)}</td>
                    <td>$${item.price_usd}</td>
                    <td>${item.seller_name}</td>
                    <td><span style="color:${isSold ? 'red':'green'}">${item.status}</span></td>
                    <td><button onclick="alert('Contact: ${item.contact_info}')">View Contact</button></td>
                    <td>${actionBtn}</td>
                </tr>`;
        });
    }

    // Handles toggling sorting state and updates UI icons
    function toggleSort(field) {
        if (currentSortField === field) {
            isAscending = !isAscending; // Toggle direction if same column is clicked
        } else {
            currentSortField = field;
            isAscending = true; // Default to ascending on a new column click
        }
        
        // Reset and update sorting arrows
        ['title', 'price_eur', 'status'].forEach(f => {
            const icon = document.getElementById(`sort-icon-${f}`);
            if (f === currentSortField) {
                icon.innerText = isAscending ? ' ▲' : ' ▼';
            } else {
                icon.innerText = ' ↕';
            }
        });

        applySorting();
    }

    // Sorts the client-side cache and redraws the table rows
    function applySorting() {
        globalListingsCache.sort((a, b) => {
            let valA = a[currentSortField];
            let valB = b[currentSortField];

            // Safety fallback for empty properties
            if (valA === undefined || valA === null) valA = '';
            if (valB === undefined || valB === null) valB = '';

            // Handle string comparisons (Title, Status)
            if (typeof valA === 'string') {
                return isAscending 
                    ? valA.localeCompare(valB) 
                    : valB.localeCompare(valA);
            }

            // Handle numeric comparisons (Price)
            return isAscending ? valA - valB : valB - valA;
        });

        renderListingsTable(globalListingsCache);
    }

    async function buyNowByIndex(index) {
        const item = globalListingsCache[index];
        if (!item || !confirm(`Confirm purchase for "${item.title}"?`)) return;

        const payload = { ...item, status: 'Sold' };
        try {
            const response = await fetch(`${API_BASE}/listings/${item.dcm_id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (response.ok) { alert("Purchase complete!"); loadListings(); }
        } catch (err) { console.error(err); }
    }

    document.getElementById('search-input').addEventListener('input', loadListings);
    window.onload = loadListings;
</script>
{% endblock %}
