<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dublin Classifieds Marketplace</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        .tabs { display: flex; border-bottom: 2px solid #716c99; margin-bottom: 20px; }
        .tab-button { padding: 10px 20px; border: none; background: #d0e3e7; cursor: pointer; font-size: 16px; margin-right: 5px; }
        .tab-button.active { background: #007bff; color: white; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; max-width: 400px; padding: 8px; box-sizing: border-box; }
        .btn-buy { background-color: #28a745; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .btn-buy:disabled { background-color: #6c757d; cursor: not-allowed; }
        .auth-panel { max-width: 400px; border: 1px solid #ccc; padding: 20px; border-radius: 5px; background: #fdfdfd; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Dublin Classifieds Marketplace</h1>
    <div id="welcome-banner" style="font-weight: bold; margin-bottom: 15px; color: #555;">Guest Session</div>

    <div class="tabs">
        <button class="tab-button active" onclick="switchTab('buying-tab')">Buying (Browse Items)</button>
        <button class="tab-button" onclick="switchTab('selling-tab')">Selling (Manage Ads)</button>
        <button class="tab-button" onclick="switchTab('user-tab')">User Info / Login</button>
    </div>

    <div id="buying-tab" class="tab-content active">
        <h3>Active Marketplace Listings</h3>
        <p>Search Ads: <input type="text" id="search-input" onkeyup="loadListings()" placeholder="Search items or categories..."></p>
        <table border="1">
            <thead>
                <tr>
                    <th>Item Title</th>
                    <th>Category</th>
                    <th>Price (EUR)</th>
                    <th>Price (USD)</th>
                    <th>Seller</th>
                    <th>Status</th>
                    <th>Contact</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="buying-table-body"></tbody>
        </table>
    </div>

    <div id="selling-tab" class="tab-content">
        <div id="selling-authorized-zone" style="display: none;">
            <h3 id="form-title">Post a New Used Item Ad</h3>
            <input type="hidden" id="item-id">
            
            <div class="form-group">
                <label>Item Title:</label>
                <input type="text" id="title" placeholder="e.g., Mountain Bike">
            </div>
            <div class="form-group">
                <label>Category:</label>
                <select id="category">
                    <option value="Electronics">Electronics</option>
                    <option value="Motors">Motors</option>
                    <option value="Books">Books</option>
                    <option value="Sports & Outdoors">Sports & Outdoors</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Clothing">Clothing</option>
                    <option value="General">General/Other</option>
                </select>
            </div>
        </div>
    </div>


    <div class="list-container">
        <h3>Sales Listings</h3>
        <table>
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Category</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody id="salesTableBody">
                </tbody>
        </table>
    </div>
        
    </div>

</body>
</html>
